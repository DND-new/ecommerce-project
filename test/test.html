      function Counter({ count, setCount }){
        const autoCountRef = React.useRef(0);

        function Count(){
          setCount(count + 1);
        }

        function resetCount(){
          setCount(0);
        }

        function autoCount(){
          setInterval(() =>{
            autoCountRef.current = autoCountRef.current + 1;
            setCount(autoCountRef.current)
          }, 1000)
          
        }

        return(
            <div className="counter-container">
              <button onClick={Count} className="counter-button">Clicked {count} time</button>
              <button onClick={resetCount} className="counter-button">Reset</button>
              <button onClick={autoCount} className="counter-button">Auto Click</button>
            </div>
        )
    }
      function App(){
        const [count, setCount] = React.useState(0);
        

        return (
          <>
            <Counter count={count} setCount={setCount}/>
        
          </>
      )
      }

    const container =  document.querySelector('.js-container');
